# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v3.2.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-case-conflict
  - id: check-executables-have-shebangs
  - id: check-symlinks
  - id: check-merge-conflict
  - id: check-yaml
    args: [--allow-multiple-documents]
  - id: check-added-large-files
    args: [--maxkb=1024]
- repo: local
  hooks:
    - id: format-comments
      name: format-comments
      entry: python tools/format-comments.py
      language: python
      files: \.(cpp|hpp|h|c|slang|slangh)$
- repo: local
  hooks:
    - id: fix-license
      name: fix-license
      entry: python tools/fix_license_hook.py
      language: python
- repo: local
  hooks:
    - id: check-ascii-source
      name: check-ascii-source
      entry: python tools/check_ascii_hook.py
      language: python
      files: \.(cpp|hpp|h|c|py|slang|slangh)$
- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v20.1.7
  hooks:
  - id: clang-format
    'types_or': [c++, c, c#, cuda]
- repo: https://github.com/psf/black
  rev: 24.4.2
  hooks:
  - id: black
- repo: local
  hooks:
    - id: slang-format
      name: slang-format
      additional_dependencies: ['clang-format==20.1.7']
      entry: tools/slang-format -i
      language: python
      files: \.(slang|slangh)$

exclude: |
  (?x)^(
      .*\.ipynb|
      build/.*|
      data/.*|
      external/.*|
      slang/falcor2/materials/.*|
      slang/falcor2/materialtracer/.*|
      src/falcor2/materials/materialx/libraries/.*|
      src/falcor2_ext/py_doc.h|
  )$
